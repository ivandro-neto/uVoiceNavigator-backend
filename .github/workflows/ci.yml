name: Wasabi Cloud Service

on:
  push:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Set version
        run: |
          MAJOR=$(node -p "require('./package.json').version" | cut -d. -f1)
          VERSION="${MAJOR}.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Nova versão: $VERSION"
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t youcall/uvoice:${{ env.VERSION }} -t youcall/uvoice:latest .

      - name: Push Docker image
        run: |
          docker push youcall/uvoice:${{ env.VERSION }}
          docker push youcall/uvoice:latest
